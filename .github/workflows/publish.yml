name: Publish @multirepo/logger

on:
  push:
    tags:
      - "logger-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ">=26"
          registry-url: "https://npm.pkg.github.com"
          scope: "@pavtaras"
      - run: npm ci
      - run: npm run build
        working-directory: packages/logger
      - run: npm publish
        working-directory: packages/logger
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN }}
